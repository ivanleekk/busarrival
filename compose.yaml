services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - LTA_DATAMALL_ACCOUNT_KEY=${LTA_DATAMALL_ACCOUNT_KEY}
      - LTA_DATAMALL_BASE_URL=${LTA_DATAMALL_BASE_URL}
      - POSTGRES_URL=postgres://postgres:password@db:5432/busarrival?sslmode=disable
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - db
      - neo4j

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - web

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=busarrival
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  neo4j_data:
